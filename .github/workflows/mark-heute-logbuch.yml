name: Einmalig – Heute-Markierung im Logbuch

on:
  pull_request:
    paths:
      - '.github/trigger-today-logbook'

permissions:
  contents: write

jobs:
  update-logbuch:
    runs-on: ubuntu-latest
    steps:
      - name: PR-Branch auschecken
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Heute-Markierung ergänzen
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('logbuch_neue5.html')
          text = path.read_text(encoding='utf-8')

          css_needle = ".tab-btn.active{ color:var(--rot); border-bottom-color:var(--rot); background:var(--weiss); }\n"
          css_insert = css_needle + """.tab-btn.is-today{
  color:var(--rot-dunkel); border-bottom-color:var(--rot); background:var(--rot-ghost);
  box-shadow:inset 0 0 0 1px var(--rot-blass);
}
.tab-btn.active.is-today{ background:var(--weiss); box-shadow:inset 0 0 0 2px var(--rot-blass); }
.today-badge{
  display:inline-flex; align-items:center; justify-content:center; margin-left:6px; padding:2px 7px;
  border-radius:999px; background:var(--rot); color:var(--weiss); font-family:var(--font-body);
  font-size:9px; font-weight:700; line-height:1.2; letter-spacing:.04em; text-transform:uppercase;
  vertical-align:middle; white-space:nowrap;
}
@media (prefers-reduced-motion:no-preference){
  .tab-btn.is-today{ animation:todayPulse 2.6s ease-in-out infinite; }
  @keyframes todayPulse{
    0%,100%{ box-shadow:inset 0 0 0 1px var(--rot-blass); }
    50%{ box-shadow:inset 0 0 0 2px var(--rot-mittel); }
  }
  .tab-btn.active.is-today{ animation:none; }
}
"""
          if css_needle not in text:
              raise SystemExit('CSS-Anker nicht gefunden')
          text = text.replace(css_needle, css_insert, 1)

          js_needle = """TABS.push({ id:'gesamt', label:'Gesamt', sub:'Abschluss' });

const tabbar = document.getElementById('tabbar');
TABS.forEach(t=>{
  const b = document.createElement('button');
  b.className = 'tab-btn'; b.dataset.target = t.id;
  b.setAttribute('role','tab');
  b.innerHTML = t.label + '<span class=\"sub\">'+t.sub+'</span>';
  b.addEventListener('click', ()=>showPanel(t.id));
  tabbar.appendChild(b);
});
"""
          js_insert = """TABS.push({ id:'gesamt', label:'Gesamt', sub:'Abschluss' });

/* Markiert automatisch den zum lokalen Datum passenden Tagesreiter. */
const TODAY_RANGES = [
  { id:'day0', start:'2026-07-13', end:'2026-07-13' },
  { id:'day1', start:'2026-07-14', end:'2026-07-14' },
  { id:'day2', start:'2026-07-15', end:'2026-07-15' },
  { id:'day3', start:'2026-07-16', end:'2026-07-16' },
  { id:'day4', start:'2026-07-17', end:'2026-07-17' },
  { id:'day5', start:'2026-09-02', end:'2026-09-02' },
  { id:'day6', start:'2026-09-03', end:'2026-09-03' },
  { id:'day7', start:'2026-09-04', end:'2026-09-08' },
];
function localDateKey(date = new Date()){
  const y = date.getFullYear();
  const m = String(date.getMonth()+1).padStart(2,'0');
  const d = String(date.getDate()).padStart(2,'0');
  return `${y}-${m}-${d}`;
}
function getTodayTabId(date = new Date()){
  const key = localDateKey(date);
  const match = TODAY_RANGES.find(range => key >= range.start && key <= range.end);
  return match ? match.id : null;
}
const todayTabId = getTodayTabId();

const tabbar = document.getElementById('tabbar');
TABS.forEach(t=>{
  const b = document.createElement('button');
  b.className = 'tab-btn'; b.dataset.target = t.id;
  b.setAttribute('role','tab');
  const todayBadge = t.id === todayTabId ? '<span class=\"today-badge\">Heute</span>' : '';
  b.innerHTML = t.label + todayBadge + '<span class=\"sub\">'+t.sub+'</span>';
  if(t.id === todayTabId){
    b.classList.add('is-today');
    b.setAttribute('aria-label', t.label + ', heute – ' + t.sub);
  }
  b.addEventListener('click', ()=>showPanel(t.id));
  tabbar.appendChild(b);
});
if(todayTabId){
  requestAnimationFrame(()=>{
    const todayButton = tabbar.querySelector('.tab-btn.is-today');
    if(todayButton){ try{ todayButton.scrollIntoView({ inline:'center', block:'nearest' }); }catch(e){} }
  });
}
"""
          if js_needle not in text:
              raise SystemExit('JavaScript-Anker nicht gefunden')
          text = text.replace(js_needle, js_insert, 1)

          path.write_text(text, encoding='utf-8')
          Path('.github/trigger-today-logbook').unlink(missing_ok=True)
          Path('.github/workflows/mark-heute-logbuch.yml').unlink()
          PY

      - name: Änderung in den PR-Branch committen
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Markiere aktuellen Logbuch-Tag als Heute"
          git push origin HEAD:${{ github.head_ref }}
