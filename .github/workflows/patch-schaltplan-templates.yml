name: Patch Schaltplan templates

on:
  push:
    branches: [main]
    paths:
      - schaltplan-template-trigger.txt

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Patch single-file app
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('fs');
          const zlib = require('zlib');

          const wrapperPath = 'schaltplan.html';
          const wrapper = fs.readFileSync(wrapperPath, 'utf8');
          const match = wrapper.match(/const data="([A-Za-z0-9+/=]+)";/);
          if (!match) throw new Error('Compressed app payload not found.');
          let source = zlib.gunzipSync(Buffer.from(match[1], 'base64')).toString('utf8');

          function replaceOnce(oldText, newText, label) {
            if (!source.includes(oldText)) throw new Error(`Patch target missing: ${label}`);
            source = source.replace(oldText, newText);
          }

          const toastCss = `  .toast{position:fixed;left:50%;bottom:48px;transform:translate(-50%,20px);background:var(--slate-dark);color:#fff;padding:10px 14px;border-radius:9px;font-size:13px;opacity:0;pointer-events:none;transition:.22s;z-index:120;box-shadow:0 8px 22px rgba(0,0,0,.2)}.toast.show{opacity:1;transform:translate(-50%,0)}\n`;
          replaceOnce(toastCss, `  .template-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-top:14px}\n  .template-card{border:1px solid #d4dce1;background:#fff;border-radius:12px;padding:14px;text-align:left;cursor:pointer;min-height:132px;display:flex;flex-direction:column;gap:7px;transition:.16s}\n  .template-card:hover,.template-card:focus-visible{border-color:var(--rust);box-shadow:0 6px 18px rgba(62,86,104,.13);transform:translateY(-1px);outline:none}\n  .template-card strong{font-size:14px;color:var(--slate-dark)}\n  .template-card span{font-size:12px;line-height:1.42;color:var(--muted)}\n  .template-card small{margin-top:auto;font-size:10px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--rust)}\n  .template-card.wide{grid-column:1/-1}\n  @media(max-width:560px){.template-grid{grid-template-columns:1fr}.template-card.wide{grid-column:auto}}\n${toastCss}`, 'template styles');

          replaceOnce(
            '<button class="toolbtn" id="exampleBtn" title="Beispielschaltung laden">◇ <span class="label">Beispiel</span></button>',
            '<button class="toolbtn" id="exampleBtn" title="Schaltungsvorlage laden">◇ <span class="label">Vorlagen</span></button>',
            'toolbar button'
          );

          const projectModal = '<div class="modal-backdrop" id="projectModal" aria-hidden="true">\n';
          const templateModal = `<div class="modal-backdrop" id="templateModal" aria-hidden="true">\n  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="templateTitle">\n    <h2 id="templateTitle">Schaltungsvorlage auswählen</h2>\n    <p>Die Vorlage ersetzt den aktuellen Schaltplan. Anschließend kannst du alle Bauteile, Werte und Leitungen frei bearbeiten.</p>\n    <div class="template-grid">\n      <button class="template-card" data-template="simple"><strong>Einfacher Stromkreis</strong><span>Batterie, geschlossener Schalter und Lampe in einem Stromkreis.</span><small>3 Bauteile</small></button>\n      <button class="template-card" data-template="series"><strong>Reihenschaltung</strong><span>Zwei Lampen liegen nacheinander im selben Stromkreis.</span><small>4 Bauteile</small></button>\n      <button class="template-card" data-template="parallel"><strong>Parallelschaltung</strong><span>Zwei Lampen sind an getrennte Zweige derselben Spannungsquelle angeschlossen.</span><small>6 Bauteile</small></button>\n      <button class="template-card" data-template="light"><strong>Transistor-Hellschaltung</strong><span>Bei Helligkeit wird der NPN-Transistor angesteuert und die Lampe eingeschaltet.</span><small>LDR · NPN · Lampe</small></button>\n      <button class="template-card" data-template="dark"><strong>Transistor-Dunkelschaltung</strong><span>Bei Dunkelheit wird der NPN-Transistor angesteuert und die Lampe eingeschaltet.</span><small>LDR · NPN · Lampe</small></button>\n    </div>\n    <div class="modal-actions"><button class="ghost" data-close="templateModal">Abbrechen</button></div>\n  </div>\n</div>\n\n`;
          replaceOnce(projectModal, templateModal + projectModal, 'template modal');

          const functionStart = source.indexOf('  function loadExample(){');
          const functionEnd = source.indexOf('  function addComponentRaw', functionStart);
          if (functionStart < 0 || functionEnd < 0) throw new Error('Example function block not found.');
          const templateFunctions = `  function addWire(from,fromTerminal,to,toTerminal,points=[]){\n    state.wires.push({id:uid('w'),from:{componentId:from.id,terminal:fromTerminal},to:{componentId:to.id,terminal:toTerminal},points});\n  }\n\n  function beginTemplate(title){\n    state.components=[];state.wires=[];state.settings.format='a4l';state.meta.title=title;\n  }\n\n  function templateSimple(){\n    beginTemplate('Einfacher Stromkreis');\n    const bat=addComponentRaw('battery',220,400,{rotation:270,ref:'G1',value:'4,5 V'});\n    const sw=addComponentRaw('switchClosed',500,220,{ref:'S1',value:''});\n    const lamp=addComponentRaw('lamp',820,400,{rotation:90,ref:'H1',value:'6 V'});\n    addWire(bat,1,sw,0,[{x:220,y:220}]);\n    addWire(sw,1,lamp,0,[{x:820,y:220}]);\n    addWire(lamp,1,bat,0,[{x:820,y:580},{x:220,y:580}]);\n  }\n\n  function templateSeries(){\n    beginTemplate('Reihenschaltung');\n    const bat=addComponentRaw('battery',220,400,{rotation:270,ref:'G1',value:'4,5 V'});\n    const sw=addComponentRaw('switchClosed',500,180,{ref:'S1',value:''});\n    const lamp1=addComponentRaw('lamp',820,310,{rotation:90,ref:'H1',value:'2,5 V'});\n    const lamp2=addComponentRaw('lamp',820,500,{rotation:90,ref:'H2',value:'2,5 V'});\n    addWire(bat,1,sw,0,[{x:220,y:180}]);\n    addWire(sw,1,lamp1,0,[{x:820,y:180}]);\n    addWire(lamp1,1,lamp2,0,[]);\n    addWire(lamp2,1,bat,0,[{x:820,y:620},{x:220,y:620}]);\n  }\n\n  function templateParallel(){\n    beginTemplate('Parallelschaltung');\n    const bat=addComponentRaw('battery',180,400,{rotation:270,ref:'G1',value:'4,5 V'});\n    const sw=addComponentRaw('switchClosed',390,180,{ref:'S1',value:''});\n    const split=addComponentRaw('junction',540,300,{ref:'',value:''});\n    const merge=addComponentRaw('junction',900,300,{ref:'',value:''});\n    const lamp1=addComponentRaw('lamp',720,300,{ref:'H1',value:'4,5 V'});\n    const lamp2=addComponentRaw('lamp',720,500,{ref:'H2',value:'4,5 V'});\n    addWire(bat,1,sw,0,[{x:180,y:180}]);\n    addWire(sw,1,split,2,[{x:540,y:180}]);\n    addWire(split,1,lamp1,0,[]);\n    addWire(lamp1,1,merge,0,[]);\n    addWire(split,3,lamp2,0,[{x:540,y:500}]);\n    addWire(lamp2,1,merge,3,[{x:900,y:500}]);\n    addWire(merge,1,bat,0,[{x:1000,y:300},{x:1000,y:640},{x:180,y:640}]);\n  }\n\n  function templateTransistor(isDark){\n    beginTemplate(isDark?'Transistor-Dunkelschaltung':'Transistor-Hellschaltung');\n    const bat=addComponentRaw('dcsource',140,390,{rotation:270,ref:'G1',value:'6 V'});\n    const lamp=addComponentRaw('lamp',870,250,{rotation:90,ref:'H1',value:'6 V'});\n    const transistor=addComponentRaw('npn',710,430,{ref:'Q1',value:'NPN'});\n    const junction=addComponentRaw('junction',380,430,{ref:'',value:''});\n    const upper=addComponentRaw(isDark?'resistor':'ldr',380,260,{rotation:90,ref:'R1',value:isDark?'10 kΩ':'LDR'});\n    const lower=addComponentRaw(isDark?'ldr':'resistor',380,560,{rotation:90,ref:'R2',value:isDark?'LDR':'10 kΩ'});\n    const baseR=addComponentRaw('resistor',530,430,{ref:'R3',value:'1 kΩ'});\n    addWire(bat,1,upper,0,[{x:140,y:130},{x:380,y:130}]);\n    addWire(bat,1,lamp,0,[{x:140,y:130},{x:870,y:130}]);\n    addWire(upper,1,junction,2,[]);\n    addWire(junction,3,lower,0,[]);\n    addWire(junction,1,baseR,0,[]);\n    addWire(baseR,1,transistor,0,[]);\n    addWire(lamp,1,transistor,1,[{x:870,y:388}]);\n    addWire(transistor,2,bat,0,[{x:752,y:650},{x:140,y:650}]);\n    addWire(lower,1,bat,0,[{x:380,y:650},{x:140,y:650}]);\n  }\n\n  const templateLoaders={\n    simple:templateSimple,\n    series:templateSeries,\n    parallel:templateParallel,\n    light:()=>templateTransistor(false),\n    dark:()=>templateTransistor(true)\n  };\n\n  function loadTemplate(key){\n    const loader=templateLoaders[key];if(!loader)return;\n    loader();selection=null;cancelModes(false);applyFormat();saveHistory();render();closeModal('templateModal');toast('Vorlage geladen und kann jetzt bearbeitet werden.');\n  }\n`;
          source = source.slice(0, functionStart) + templateFunctions + source.slice(functionEnd);

          replaceOnce(
            "  el('exampleBtn').onclick=()=>{if((state.components.length||state.wires.length)&&!confirm('Aktuellen Schaltplan durch die Beispielschaltung ersetzen?'))return;loadExample()};",
            "  el('exampleBtn').onclick=()=>openModal('templateModal');\n  document.querySelectorAll('[data-template]').forEach(b=>b.onclick=()=>{if((state.components.length||state.wires.length)&&!confirm('Aktuellen Schaltplan durch diese Vorlage ersetzen?'))return;loadTemplate(b.dataset.template)});",
            'template button handler'
          );

          const compressed = zlib.gzipSync(Buffer.from(source, 'utf8'), {level: 9, mtime: 0}).toString('base64');
          const output = `<!doctype html>\n<html lang="de">\n<head>\n<meta charset="utf-8">\n<meta name="viewport" content="width=device-width,initial-scale=1">\n<title>Schaltplan Studio – Prototyp</title>\n</head>\n<body>\n<script>\n(async()=>{\n  const data="${compressed}";\n  const bytes=Uint8Array.from(atob(data),c=>c.charCodeAt(0));\n  const stream=new Blob([bytes]).stream().pipeThrough(new DecompressionStream('gzip'));\n  const html=await new Response(stream).text();\n  document.open();document.write(html);document.close();\n})().catch(err=>{document.body.innerHTML='<p style="font-family:sans-serif;padding:2rem">Die App konnte nicht geladen werden.</p>';console.error(err)});\n</script>\n</body>\n</html>\n`;
          fs.writeFileSync(wrapperPath, output);
          NODE

      - name: Commit update and clean temporary files
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add schaltplan.html
          git rm -f --ignore-unmatch schaltplan-template-trigger.txt schaltplan-template-payload-1.txt schaltplan-template-payload-2.txt schaltplan-template-payload-3.txt
          git rm -f --ignore-unmatch .github/workflows/update-schaltplan-templates.yml .github/workflows/assemble-schaltplan-payload.yml .github/workflows/patch-schaltplan-templates.yml
          git commit -m "Add circuit templates to Schaltplan Studio"
          git push origin main
