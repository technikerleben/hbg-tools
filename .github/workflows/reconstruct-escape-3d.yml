name: Reconstruct escape-3d upload

on:
  push:
    branches:
      - upload-escape-3d
    paths:
      - '.upload/READY'

permissions:
  contents: write

jobs:
  reconstruct:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: upload-escape-3d
          fetch-depth: 0

      - name: Reconstruct HTML
        shell: bash
        run: |
          set -euo pipefail
          cat .upload/escape.part*.b64 | base64 --decode | bzip2 --decompress > escape-3d.html
          echo "9f0da50d6b27dc24b1cced4d00b80d646acff8f0d9da303c17062590f0165a55  escape-3d.html" | sha256sum --check --strict
          rm -rf .upload
          rm -f .github/workflows/reconstruct-escape-3d.yml

      - name: Commit reconstructed file
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add Three.js 3D printing escape game"
          git push origin HEAD:upload-escape-3d
