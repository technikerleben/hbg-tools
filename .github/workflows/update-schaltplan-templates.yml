name: Update Schaltplan templates

on:
  issues:
    types: [closed]

permissions:
  contents: write
  issues: read

jobs:
  update:
    if: github.event.issue.title == 'update-schaltplan-templates'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100
            });
            const payload = [context.payload.issue.body || '', ...comments.map(c => c.body || '')]
              .join('')
              .replace(/\s+/g, '');
            fs.writeFileSync('/tmp/schaltplan-payload.txt', payload);

      - name: Build single-file app
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('fs');
          const data = fs.readFileSync('/tmp/schaltplan-payload.txt', 'utf8').trim();
          const html = `<!doctype html>
          <html lang="de">
          <head>
          <meta charset="utf-8">
          <meta name="viewport" content="width=device-width,initial-scale=1">
          <title>Schaltplan Studio – Prototyp</title>
          </head>
          <body>
          <script>
          (async()=>{
            const data="${data}";
            const bytes=Uint8Array.from(atob(data),c=>c.charCodeAt(0));
            const stream=new Blob([bytes]).stream().pipeThrough(new DecompressionStream('gzip'));
            const html=await new Response(stream).text();
            document.open();document.write(html);document.close();
          })().catch(err=>{document.body.innerHTML='<p style="font-family:sans-serif;padding:2rem">Die App konnte nicht geladen werden.</p>';console.error(err)});
          </script>
          </body>
          </html>
          `;
          fs.writeFileSync('schaltplan.html', html.replace(/^          /gm, ''));
          NODE

      - name: Commit update
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add schaltplan.html
          git rm .github/workflows/update-schaltplan-templates.yml
          git commit -m "Add circuit templates to Schaltplan Studio"
          git push origin main
