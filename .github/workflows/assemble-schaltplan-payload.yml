name: Assemble Schaltplan payload

on:
  push:
    branches: [main]
    paths:
      - schaltplan-template-payload-3.txt

permissions:
  contents: write

jobs:
  assemble:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Build single-file app
        shell: bash
        run: |
          cat schaltplan-template-payload-1.txt schaltplan-template-payload-2.txt schaltplan-template-payload-3.txt > /tmp/schaltplan-payload.txt
          node <<'NODE'
          const fs = require('fs');
          const data = fs.readFileSync('/tmp/schaltplan-payload.txt', 'utf8').replace(/\s+/g, '');
          const html = `<!doctype html>
          <html lang="de">
          <head>
          <meta charset="utf-8">
          <meta name="viewport" content="width=device-width,initial-scale=1">
          <title>Schaltplan Studio – Prototyp</title>
          </head>
          <body>
          <script>
          (async()=>{
            const data="${data}";
            const bytes=Uint8Array.from(atob(data),c=>c.charCodeAt(0));
            const stream=new Blob([bytes]).stream().pipeThrough(new DecompressionStream('gzip'));
            const html=await new Response(stream).text();
            document.open();document.write(html);document.close();
          })().catch(err=>{document.body.innerHTML='<p style="font-family:sans-serif;padding:2rem">Die App konnte nicht geladen werden.</p>';console.error(err)});
          </script>
          </body>
          </html>
          `;
          fs.writeFileSync('schaltplan.html', html.replace(/^          /gm, ''));
          NODE

      - name: Commit update
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add schaltplan.html
          git rm schaltplan-template-payload-1.txt schaltplan-template-payload-2.txt schaltplan-template-payload-3.txt
          git rm .github/workflows/update-schaltplan-templates.yml .github/workflows/assemble-schaltplan-payload.yml
          git commit -m "Add circuit templates to Schaltplan Studio"
          git push origin main
