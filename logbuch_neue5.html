<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Logbuch – Jahrgangsteam Neue 5 · HBG Dortmund</title>
<style>
html,body{width:100%;height:100%;margin:0;overflow:hidden;background:#F7F5F2}
iframe{display:block;width:100%;height:100%;border:0;background:#fff}
</style>
</head>
<body>
<iframe id="logbuch" src="./logbuch_neue5_original.html" title="Logbuch – Jahrgangsteam Neue 5"></iframe>
<script>
const TODAY_RANGES=[
  {id:'day0',start:'2026-07-13',end:'2026-07-13'},
  {id:'day1',start:'2026-07-14',end:'2026-07-14'},
  {id:'day2',start:'2026-07-15',end:'2026-07-15'},
  {id:'day3',start:'2026-07-16',end:'2026-07-16'},
  {id:'day4',start:'2026-07-17',end:'2026-07-17'},
  {id:'day5',start:'2026-09-02',end:'2026-09-02'},
  {id:'day6',start:'2026-09-03',end:'2026-09-03'},
  {id:'day7',start:'2026-09-04',end:'2026-09-08'}
];
function localDateKey(date=new Date()){
  const y=date.getFullYear();
  const m=String(date.getMonth()+1).padStart(2,'0');
  const d=String(date.getDate()).padStart(2,'0');
  return `${y}-${m}-${d}`;
}
function todayTabId(date=new Date()){
  const key=localDateKey(date);
  const hit=TODAY_RANGES.find(r=>key>=r.start&&key<=r.end);
  return hit?hit.id:null;
}
const frame=document.getElementById('logbuch');
frame.addEventListener('load',()=>{
  const doc=frame.contentDocument;
  if(!doc)return;

  // Aktualisierte Definitionen der Arbeitsfelder e, f und g direkt in der Original-App setzen.
  const dataPatch=doc.createElement('script');
  dataPatch.textContent=`
    (()=>{
      const replacements={
        e:'Wir ergänzen ggf. die SRL-unterstützende Grundausstattung der Klassenräume und halten diese fest: sichtbarer großer Stundenplan, Infotafel (Termine, KA-Termine, Dienste, Lernaufgaben), UZ-in-the-box u. a.',
        f:'Wir haben eine einheitliche Basis der Bezeichnung zentraler SRL-Begriffe im Jahrgang, damit SuS und Eltern im ganzen Jahrgang dieselbe Sprache hören. Diese gemeinsame Basis kann durch euch erweitert werden - etwa durch die Bezeichnung von Tools, die ihr im Jahrgang nutzen möchtet und muss allen Beteiligten transparent gemacht werden. <a href="https://teams.microsoft.com/l/message/19:27680b2624ad41a98b76e888c9e8de55@thread.tacv2/1783521756316?tenantId=70dadace-261a-44c3-b30c-60935d38279c&groupId=0b0783e4-f4f7-4773-b727-d26fbce92dff&parentMessageId=1783502885228&teamName=Lernen%20an%20der%20HBG&channelName=3.%20Jahrgang%205&createdTime=1783521756316" target="_blank" rel="noopener">Basis siehe Teams-Beitrag.</a>',
        g:'Wir legen fest, wie individuelle Rückmeldegespräche mit SuS zu ihrem Lernprozess ablaufen – auf Basis des Logbuchs: Turnus, Dauer, Zuständigkeit (Klassenleitung und/oder Fachlehrkräfte), Zeitfenster im Stundenplan. Hierzu nutzen wir die bestehende Vorlage und passen diese ggf. an.'
      };
      DATA.ARBEITSFELDER_DEFINITIONEN=DATA.ARBEITSFELDER_DEFINITIONEN.map(([letter,text])=>[letter,replacements[letter]||text]);
      const current=document.querySelector('.panel.active')?.dataset.panel||'start';
      buildContent();
      showPanel(current);
    })();
  `;
  doc.body.appendChild(dataPatch);

  const id=todayTabId();
  if(!id)return;
  const style=doc.createElement('style');
  style.textContent=`
    .tab-btn.is-today{color:var(--rot-dunkel)!important;border-bottom-color:var(--rot)!important;background:var(--rot-ghost)!important;box-shadow:inset 0 0 0 1px var(--rot-blass)!important}
    .tab-btn.active.is-today{background:var(--weiss)!important;box-shadow:inset 0 0 0 2px var(--rot-blass)!important}
    .today-badge{display:inline-flex;align-items:center;justify-content:center;margin-left:6px;padding:2px 7px;border-radius:999px;background:var(--rot);color:var(--weiss);font-family:var(--font-body);font-size:9px;font-weight:700;line-height:1.2;letter-spacing:.04em;text-transform:uppercase;vertical-align:middle;white-space:nowrap}
    @media (prefers-reduced-motion:no-preference){.tab-btn.is-today{animation:todayPulse 2.6s ease-in-out infinite}.tab-btn.active.is-today{animation:none}@keyframes todayPulse{0%,100%{box-shadow:inset 0 0 0 1px var(--rot-blass)}50%{box-shadow:inset 0 0 0 2px var(--rot-mittel)}}}
  `;
  doc.head.appendChild(style);
  const tab=doc.querySelector(`.tab-btn[data-target="${id}"]`);
  if(!tab)return;
  tab.classList.add('is-today');
  if(!tab.querySelector('.today-badge')){
    const badge=doc.createElement('span');
    badge.className='today-badge';
    badge.textContent='Heute';
    const sub=tab.querySelector('.sub');
    tab.insertBefore(badge,sub||null);
  }
  tab.setAttribute('aria-label',(tab.textContent||'').trim()+', heute');
  requestAnimationFrame(()=>{try{tab.scrollIntoView({inline:'center',block:'nearest'})}catch(e){}});
});
</script>
</body>
</html>
