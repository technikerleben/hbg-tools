<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Logbuch – Jahrgangsteam Neue 5 · HBG Dortmund</title>
<style>
html,body{width:100%;height:100%;margin:0;overflow:hidden;background:#F7F5F2}
iframe{display:block;width:100%;height:100%;border:0;background:#fff}
</style>
</head>
<body>
<iframe id="logbuch" src="./logbuch_neue5_original.html" title="Logbuch – Jahrgangsteam Neue 5"></iframe>
<script>
const TODAY_RANGES=[
  {id:'day0',start:'2026-07-13',end:'2026-07-13'},
  {id:'day1',start:'2026-07-14',end:'2026-07-14'},
  {id:'day2',start:'2026-07-15',end:'2026-07-15'},
  {id:'day3',start:'2026-07-16',end:'2026-07-16'},
  {id:'day4',start:'2026-07-17',end:'2026-07-17'},
  {id:'day5',start:'2026-09-02',end:'2026-09-02'},
  {id:'day6',start:'2026-09-03',end:'2026-09-03'},
  {id:'day7',start:'2026-09-04',end:'2026-09-08'}
];
function localDateKey(date=new Date()){
  const y=date.getFullYear();
  const m=String(date.getMonth()+1).padStart(2,'0');
  const d=String(date.getDate()).padStart(2,'0');
  return `${y}-${m}-${d}`;
}
function todayTabId(date=new Date()){
  const key=localDateKey(date);
  const hit=TODAY_RANGES.find(r=>key>=r.start&&key<=r.end);
  return hit?hit.id:null;
}
const frame=document.getElementById('logbuch');
frame.addEventListener('load',()=>{
  const doc=frame.contentDocument;
  if(!doc)return;
  const id=todayTabId();
  if(!id)return;
  const style=doc.createElement('style');
  style.textContent=`
    .tab-btn.is-today{color:var(--rot-dunkel)!important;border-bottom-color:var(--rot)!important;background:var(--rot-ghost)!important;box-shadow:inset 0 0 0 1px var(--rot-blass)!important}
    .tab-btn.active.is-today{background:var(--weiss)!important;box-shadow:inset 0 0 0 2px var(--rot-blass)!important}
    .today-badge{display:inline-flex;align-items:center;justify-content:center;margin-left:6px;padding:2px 7px;border-radius:999px;background:var(--rot);color:var(--weiss);font-family:var(--font-body);font-size:9px;font-weight:700;line-height:1.2;letter-spacing:.04em;text-transform:uppercase;vertical-align:middle;white-space:nowrap}
    @media (prefers-reduced-motion:no-preference){.tab-btn.is-today{animation:todayPulse 2.6s ease-in-out infinite}.tab-btn.active.is-today{animation:none}@keyframes todayPulse{0%,100%{box-shadow:inset 0 0 0 1px var(--rot-blass)}50%{box-shadow:inset 0 0 0 2px var(--rot-mittel)}}}
  `;
  doc.head.appendChild(style);
  const tab=doc.querySelector(`.tab-btn[data-target="${id}"]`);
  if(!tab)return;
  tab.classList.add('is-today');
  if(!tab.querySelector('.today-badge')){
    const badge=doc.createElement('span');
    badge.className='today-badge';
    badge.textContent='Heute';
    const sub=tab.querySelector('.sub');
    tab.insertBefore(badge,sub||null);
  }
  tab.setAttribute('aria-label',(tab.textContent||'').trim()+', heute');
  requestAnimationFrame(()=>{try{tab.scrollIntoView({inline:'center',block:'nearest'})}catch(e){}});
});
</script>
</body>
</html>
