<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>B201 SRL-Raumkonzept</title>
  <style>
    :root{--slate:#2C3D4C;--rust:#D97A4A;--pale:#D0DCE6;--bg:#F5F4F1}
    *{box-sizing:border-box}html,body{height:100%;margin:0}body{display:grid;place-items:center;background:var(--bg);color:var(--slate);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif}main{max-width:620px;padding:32px;text-align:center}.spinner{width:44px;height:44px;margin:0 auto 18px;border:4px solid var(--pale);border-top-color:var(--rust);border-radius:50%;animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}h1{font-size:1.25rem;margin:0 0 8px}p{line-height:1.5}
  </style>
</head>
<body>
<main id="loading"><div class="spinner" aria-hidden="true"></div><h1>Raumplaner wird geladen …</h1><p>Die interaktive B201-Konfiguration wird vorbereitet.</p></main>
<script>
(async()=>{
  const parts=[1,2,3,4,5].map(n=>`b201-data/part-${String(n).padStart(2,'0')}.txt`);
  try{
    if(!('DecompressionStream' in window)) throw new Error('Dieser Browser unterstützt die benötigte Dekomprimierung nicht.');
    const responses=await Promise.all(parts.map(url=>fetch(url,{cache:'no-store'})));
    responses.forEach((response,index)=>{if(!response.ok) throw new Error(`Datenteil ${index+1} konnte nicht geladen werden.`);});
    const encoded=(await Promise.all(responses.map(response=>response.text()))).join('').replace(/\s+/g,'');
    const binary=atob(encoded);
    const bytes=new Uint8Array(binary.length);
    for(let i=0;i<binary.length;i++) bytes[i]=binary.charCodeAt(i);
    const stream=new Blob([bytes]).stream().pipeThrough(new DecompressionStream('gzip'));
    let html=await new Response(stream).text();

    /* Korrektur für ältere Lernbüro-Presets: Der später ergänzte fünfte
       Tisch besitzt dort noch keinen gespeicherten item-64-Eintrag. */
    if(!html.includes('const extraTableId = extraMidTable.userData.editorId;')){
      const anchor='    useLooseChairs = looseChairs.some(chair => chair.visible !== false);';
      const fallback=`    /* Fehlender fünfter Tisch in älteren Presets */\n    const extraTableId = extraMidTable.userData.editorId;\n    if (L.extraMt && !imported.items[extraTableId]) {\n      extraMidTable.visible = true;\n      tween(extraMidTable, L.extraMt, 0.10);\n    }\n\n`;
      if(!html.includes(anchor)) throw new Error('Die Tischkorrektur konnte nicht eingesetzt werden.');
      html=html.replace(anchor,fallback+anchor);
    }

    /* Einheitliche Tischplatten in Holzoptik; nur der höhenverstellbare
       Tisch behält seinen gelben Farbwert. */
    html=html
      .replace(/tableFix:\s*0x[0-9A-Fa-f]+,\s*\/\/[^\n]*/, 'tableFix:   0xB88A5A,   // Holzton')
      .replace(/tableMove:\s*0x[0-9A-Fa-f]+,\s*\/\/[^\n]*/, 'tableMove:  0xB88A5A,   // Holzton');

    /* Bezeichnungen und Beschreibungen an die einheitliche Holzoptik anpassen. */
    const textReplacements=[
      ['<div class="leg-row"><span class="leg-dot" style="background:#8E3B40"></span> Doppeltisch 130×50 (8 Tische fest)</div>','<div class="leg-row"><span class="leg-dot" style="background:#B88A5A"></span> Doppeltische an den Wänden (fest)</div>'],
      ['<div class="leg-row"><span class="leg-dot" style="background:#D97A4A"></span> Doppeltisch Mitte (beweglich)</div>','<div class="leg-row"><span class="leg-dot" style="background:#B88A5A"></span> Doppeltische in der Mitte (beweglich)</div>'],
      ['<div class="leg-row"><span class="leg-dot" style="background:#7DBB6F"></span> Stapelhocker (25 + Rollstuhlplatz)</div>','<div class="leg-row"><span class="leg-dot" style="background:#B9CDBB"></span> Stühle (25 + Rollstuhlplatz)</div>'],
      ['<div class="leg-row"><span class="leg-dot" style="background:#3E5668"></span> 2 Materialwagen / 2 Akustik-Stellwände</div>','<div class="leg-row"><span class="leg-dot" style="background:#3E5668"></span> 2 Materialwagen / 1 Akustik-Stellwand</div>'],
      ['Roter Doppeltisch','Doppeltisch außen'],
      ['Oranger Doppeltisch','Doppeltisch Mitte'],
      ['Dauerhafte Grundstellung und Standardansicht: Das orangefarbene Mittelcluster besteht aus zwei geschlossenen Reihen entlang der langen Raumachse. Der zusätzliche orangefarbene Tisch steht unten an der Wand neben der Tür und ergänzt dort zwei weitere Plätze. Der höhenverstellbare Tisch steht quer davor nahe der Materialtheke.','Dauerhafte Grundstellung und Standardansicht: Die Holztische im Mittelcluster stehen in zwei geschlossenen Reihen entlang der langen Raumachse. Ein zusätzlicher Holztisch steht unten an der Wand neben der Tür und ergänzt dort zwei weitere Plätze. Der gelbe höhenverstellbare Tisch steht quer davor nahe der Materialtheke.'],
      ['Fünf Gruppencluster. Der zusätzliche orangefarbene Tisch ergänzt den bisherigen Zweiercluster zu einem Dreiercluster. Die unteren orangenen Tische haben ihre Stühle auf der Außenseite. Der höhenverstellbare Tisch steht oben mittig am richtigen Ort und bleibt quer ausgerichtet.','Fünf Gruppencluster aus einheitlichen Holztischen. Der zusätzliche Tisch ergänzt den bisherigen Zweiercluster zu einem Dreiercluster. Bei den unteren Tischgruppen stehen die Stühle auf der Außenseite. Der gelbe höhenverstellbare Tisch steht oben mittig und bleibt quer ausgerichtet.'],
      ['Die Input-Konfiguration zeigt die Tische genau wie im Lernbüro. Der zusätzliche orangefarbene Tisch steht unten an der Wand neben der Tür. Die Stühle stehen in vier breiten Reihen weiter entfernt von der digitalen Tafel. Der ovale Stehtisch parkt außerhalb des Halbkreises.','Die Input-Konfiguration übernimmt die Tischpositionen aus dem Lernbüro. Der zusätzliche Holztisch steht unten an der Wand neben der Tür. Die Stühle stehen in vier breiten Reihen mit Abstand zur digitalen Tafel. Der ovale Stehtisch parkt außerhalb des Halbkreises.'],
      ['Für den Sitzkreis bleiben die roten Tische an ihren Wandpositionen. Die orangefarbenen Tische rücken vor die Materialregale an die linke Raumseite, damit in der Mitte Platz für den Kreis entsteht. Der Türbereich bleibt frei; den Kreis bilden 25 lose Stühle.','Für den Sitzkreis bleiben die wandständigen Holztische an ihren Positionen. Die beweglichen Holztische rücken vor die Materialregale an die linke Raumseite, damit in der Mitte Platz für den Kreis entsteht. Der Türbereich bleibt frei; den Kreis bilden 25 lose Stühle.']
    ];
    textReplacements.forEach(([from,to])=>{html=html.split(from).join(to);});

    document.open();
    document.write(html);
    document.close();
  }catch(error){
    console.error(error);
    document.getElementById('loading').innerHTML=`<h1>Raumplaner konnte nicht geladen werden</h1><p>${String(error.message||error)}</p><p>Bitte die Seite neu laden oder einen aktuellen Browser verwenden.</p>`;
  }
})();
</script>
</body>
</html>
